# std — CI quality pipeline (GitHub Actions · Epic 1: Enforcement Harness).
#
# Mirrors the GitLab gate set (.gitlab-ci.yml) on the same invariants, the GitHub-native way.
# Generated via BMad TEA (bmad-testarch-ci) and adapted down from the npm/Playwright template:
# std is a pure Bun project (39 fast unit + static gates, no e2e), so the sharding / browser-install
# / weekly burn-in scaffolding does not apply — removed deliberately, not forgotten.
#
# The gates run as ordered steps in one job (install resolves once; each gate is sub-second and
# fails the build on a non-zero exit). Server-side code review is handled by the CodeRabbit GitHub
# App, not a CI job — so there is no review step here and no API key in CI.

name: CI

on:
  push:
    branches: [main]
  pull_request:

# One in-flight run per ref; a newer push cancels the older run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Gate 1 — deps resolve exactly from the committed lockfile (frozen).
      - name: Install (frozen lockfile)
        run: bun install --frozen-lockfile

      # Gate 2 — unit tests green (NFR5/D6: tests beside code).
      - name: Test
        run: bun test

      # Gate 3 — TypeScript strict typecheck, no emit (NFR6).
      - name: Typecheck
        run: bun run typecheck

      # Gate 3b — proof/ typecheck (the not-yet-live PAI-tool rewrites). Manual-only since Epic 12
      # (open Q3); wired here per the Epic-16 retro so proof/ type-regressions can't ship silently.
      - name: Typecheck proof
        run: bun run typecheck:proof

      # Gate 3c — src/cn/ typecheck under its OWN scoped config (lib ESNext+DOM, types []). The root
      # typecheck EXCLUDES src/cn/**, so without this step the Obsidian edge would ship untypechecked.
      # `types: []` also makes a stray process/Bun/node:* in the slice a compile error (Story 7.1 AC5).
      - name: Typecheck cn
        run: bun run typecheck:cn

      # Gate 3d — src/dashkit/ typecheck under its OWN scoped config (lib ESNext+DOM, types []),
      # mirroring Gate 3c. The root typecheck EXCLUDES src/dashkit/**, so without this step the
      # note-report Obsidian edge would ship untypechecked. `types: []` also makes a stray
      # process/Bun/node:* in the slice a compile error (Story 8.2 AC1/AC14).
      - name: Typecheck dashkit
        run: bun run typecheck:dashkit

      # Gate 4 — core is runtime-neutral: no node:*/fs/DOM/network, no process/document (D1/NFR1/CM3).
      - name: Core purity
        run: bun run check:core-purity

      # Gate 5 — std is a clean dependency root: no loom/PAI-Tools back-edge, no import cycle (D4/NFR2/SM2).
      - name: Dependency root + no cycle
        run: bun run check:dep-root

      # Gate 6 — core is the single source of the shared vocabulary: no duplicate cite/severity/stat/
      # counts definition outside src/core/** (D2/NFR4/SM1). STD_CONSUMERS is unset in CI, so the
      # cross-repo consumer scan is SKIP-as-green; the within-std assertion is what gates every PR.
      - name: Single-source vocabulary
        run: bun run check:single-source

      # Gate 7 — std source bakes in no consumer identity: no literal consumer identifier in src/**
      # outside *.test.ts (D3/D4/NFR3 assertion 2 — the NFR2∩NFR3 collapse). std-local, always
      # runnable, no SKIP path. Gates Epic 4, where cli core lands.
      - name: No consumer identifiers
        run: bun run check:no-consumer-ids
